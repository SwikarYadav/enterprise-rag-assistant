 <div class="cursor" id="cursor"></div>
  <div class="cursor-follower" id="cursorFollower"></div>

<div class="chatbot-icon" *ngIf="!isChatOpen" (click)="toggleChat()">✨</div>

<div 
  class="chat-window chat-open-bounce"
  *ngIf="isChatOpen || isClosing"
  [class.open-animation]="!isClosing"
  [class.close-animation]="isClosing"
>

 <div class="help-tooltip" *ngIf="showHelpMessage && !isChatOpen">
    Ask me for help 👋
  </div>

<div class="chat-header">
    <div class="header-left">
      <span class="icon-btn" (click)="toggleChat()">❮</span>
      <div class="header-avatar">✨</div>
      <div class="header-title">
        <h2>BankSathi</h2>
        <p>Ask Anything</p>
      </div>
    </div>
<div class="menu-wrapper">

  <span class="icon-btn" (click)="toggleMenu()">⋮</span>

  <div class="menu-dropdown" *ngIf="showMenu">

    <div class="menu-item" (click)="newChat()">
      New Chat
    </div>

    <div class="menu-item" (click)="searchChat()">
      Search Chat
    </div>

  </div>

</div>
  </div>

  <div class="chat-body" #chatBody>
    <div class="message-row" *ngFor="let msg of messages" [ngClass]="msg.sender">
      <div class="avatar bot-avatar" *ngIf="msg.sender === 'bot'">✨</div>

<div 
  class="message-bubble"
  [class.welcome-animation]="msg.welcome"
>
        <ng-container *ngIf="!msg.loading">
          {{ msg.text }}
        </ng-container>

        <div class="loader" *ngIf="msg.loading">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
      </div>
      <div class="avatar user-avatar" *ngIf="msg.sender === 'user'">🧑🏻</div>
    </div>
  </div>

  <div class="chat-footer">
    <div class="input-wrapper">
      <div class="input-actions">
        <button class="icon-btn" title="Voice Input" (click)="toggleVoiceInput()">
          <img
            [src]="
              isListening
                ? 'assets/icons/icons8-recording-30.png'
                : 'assets/icons/icons8-mic-24.png'
            "
            class="custom-icon"
          />
        </button>

       <button
  class="icon-btn"
  title="Attach"
  (click)="fileInput.click()">

  <img
    src="assets/icons/icons8-attach-30.png"
    alt="Attach"
    class="custom-icon" />

</button>

<input
  #fileInput
  type="file"
  hidden
  (change)="onFileSelected($event)">
      </div>

      <input
        [(ngModel)]="userMessage"
        (keyup.enter)="sendMessage()"
        placeholder="Send message..."
      />

     <button 
  class="icon-btn send-action"
  (click)="sendMessage()"
  [disabled]="!userMessage.trim()"
  [class.active-send]="userMessage.trim()"
>
  <img src="assets/icons/icons8-send-24.png" class="custom-icon">
</button>
    </div>
  </div>
</div>
